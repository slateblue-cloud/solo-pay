name: solo-pay

services:
  # MySQL 8.0 - Payment Data
  mysql:
    image: mysql:8.0
    container_name: solo-pay-mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: solopay
      MYSQL_USER: solopay
      MYSQL_PASSWORD: pass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - solo-pay-network
    healthcheck:
      test:
        ['CMD', 'mysql', '-h', 'localhost', '-u', 'solopay', '-ppass', 'solopay', '-e', 'SELECT 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Database Init (creates extra databases and grants, runs once as root)
  db-init:
    image: mysql:8.0
    container_name: solo-pay-db-init
    restart: 'no'
    entrypoint: ['mysql', '-h', 'mysql', '-u', 'root', '-ppass', '-e']
    command:
      - >
        CREATE DATABASE IF NOT EXISTS solopay_sample_merchant CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
        GRANT ALL PRIVILEGES ON solopay_sample_merchant.* TO 'solopay'@'%';
        GRANT CREATE, DROP ON *.* TO 'solopay'@'%';
        FLUSH PRIVILEGES;
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - solo-pay-network

  # Database Migration (runs once and exits)
  database-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile.packages
      target: database-sync
    image: 347765734000.dkr.ecr.ap-northeast-2.amazonaws.com/solo-pay/database-sync:nightly
    container_name: solo-pay-database-sync
    restart: 'no'
    environment:
      DATABASE_URL: mysql://solopay:pass@mysql:3306/solopay
    depends_on:
      db-init:
        condition: service_completed_successfully
    command: >
      sh -c "pnpm exec prisma db push && pnpm exec tsx prisma/seed.ts"
    networks:
      - solo-pay-network

  # Redis 7 Alpine - Caching
  redis:
    image: redis:7-alpine
    container_name: solo-pay-redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - solo-pay-network

  # Simple Relayer Service (Gasless transaction relay for Amoy)
  # simple-relayer:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.packages
  #     target: simple-relayer
  #   container_name: solo-pay-simple-relayer
  #   ports:
  #     - "3002:3001"
  #   environment:
  #     NODE_ENV: development
  #     HOST: 0.0.0.0
  #     PORT: 3001
  #     # TODO: Set your relayer private key (DO NOT COMMIT!)
  #     RELAYER_PRIVATE_KEY: "${RELAYER_PRIVATE_KEY}"
  #     RPC_URL: https://rpc-amoy.polygon.technology
  #     CHAIN_ID: 80002
  #     FORWARDER_ADDRESS: "0xE8a3C8e530dddd14e02DA1C81Df6a15f41ad78DE"
  #   networks:
  #     - solo-pay-network
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
  #     interval: 30s
  #     timeout: 3s
  #     retries: 3
  #     start_period: 10s

  # Webhook Manager (monitors blockchain + sends payment.confirmed to merchant webhook_url)
  webhook-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.packages
      target: webhook-manager
    image: 347765734000.dkr.ecr.ap-northeast-2.amazonaws.com/solo-pay/webhook-manager:nightly
    container_name: solo-pay-webhook-manager
    restart: always
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: mysql://solopay:pass@mysql:3306/solopay
      POLLING_INTERVAL_MS: 5000
      BLOCKCHAIN_CHECK_INTERVAL_MS: 1000
      PAYMENT_MONITOR_TIMEOUT_MS: 1800000
    depends_on:
      database-sync:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - solo-pay-network

  # Payment Gateway (Fastify)
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.packages
      target: gateway
    image: 347765734000.dkr.ecr.ap-northeast-2.amazonaws.com/solo-pay/gateway:nightly
    container_name: solo-pay-gateway
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://solopay:pass@mysql:3306/solopay
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: solopay
      MYSQL_PASSWORD: pass
      MYSQL_DATABASE: solopay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BLOCKCHAIN_RPC_URL: https://rpc-amoy.polygon.technology
      # Relayer API keys per chain (resolved from DB relayer_url)
      RELAY_API_KEY_80002: ${RELAY_API_KEY_80002:-amoy-dev-api-key}
      # Server signer private key for EIP-712 payment signatures
      # TODO: Set your signer private key (DO NOT COMMIT!)
      SIGNER_PRIVATE_KEY: '${SIGNER_PRIVATE_KEY}'
    depends_on:
      database-sync:
        condition: service_completed_successfully
      redis:
        condition: service_started
      # simple-relayer:
      #   condition: service_healthy
    networks:
      - solo-pay-network
      - msq-network

  # Demo App (Next.js)
  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.packages
      target: demo
    image: 347765734000.dkr.ecr.ap-northeast-2.amazonaws.com/solo-pay/demo:nightly
    container_name: solo-pay-demo
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      # Chain Configuration (서버 런타임 환경변수 - /api/config에서 클라이언트에 전달)
      CHAIN_ID: 80002
      RPC_URL: https://rpc-amoy.polygon.technology
      CHAIN_NAME: Polygon Amoy
      # API URLs
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Server-side API URL (Docker internal network)
      SOLO_PAY_API_URL: http://gateway:3001
      # Merchant API Key (same as docker-compose.yaml: merchant_demo_001)
      SOLO_PAY_API_KEY: '123'
      SOLO_PAY_PUBLIC_KEY: 'pk_test_demo'
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - solo-pay-network

networks:
  solo-pay-network:
    driver: bridge
  msq-network:
    external: true

volumes:
  mysql-data:
  redis-data:
