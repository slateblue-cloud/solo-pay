name: solo-pay-hardhat

services:
  # Hardhat Local Blockchain + Contract Deployment
  hardhat-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile.hardhat
    image: solopay/hardhat:latest
    pull_policy: build
    container_name: solo-pay-hardhat-node
    restart: always
    ports:
      - '8545:8545'
    command: >
      sh -c "npx hardhat node --hostname 0.0.0.0 &
             sleep 5 &&
             npx hardhat run scripts/check-and-deploy.ts --network localhost &&
             wait"