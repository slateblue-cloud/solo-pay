# Trusted Publishing (OIDC) — no long-lived tokens.
# One-time npm setup: each package → Settings → Trusted publishing → Workflow: npm-publish.yml
name: NPM Publish

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @solo-pay/widget-js run build
          pnpm --filter @solo-pay/widget-react run build

      - name: Publish packages
        run: |
          set -e
          for pkg in @solo-pay/widget-js @solo-pay/widget-react; do
            version=$(pnpm --filter "$pkg" exec -- node -p "require('./package.json').version")
            if npm view "$pkg@$version" version 2>/dev/null; then
              echo "::notice::$pkg@$version already published, skipping"
            else
              pnpm --filter "$pkg" exec -- npm publish --no-git-checks --access public
            fi
          done
