# Trusted Publishing (OIDC) — no long-lived tokens. One-time setup on npmjs.com:
# For each package (@solo-pay/widget-js, @solo-pay/widget-react): Package → Settings →
# Trusted publishing → GitHub Actions → Workflow filename: npm-publish.yml
name: NPM Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"  # OIDC requires Node 22.14+
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish @solo-pay/widget-js
        run: pnpm --filter @solo-pay/widget-js exec -- npm publish --no-git-checks --access public

      - name: Publish @solo-pay/widget-react
        run: pnpm --filter @solo-pay/widget-react exec -- npm publish --no-git-checks --access public
